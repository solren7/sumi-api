version: "2"
sql:
  - schema: "sqlc/schema.sql" # 相对根目录的路径
    queries: "sqlc/queries.sql"
    engine: "postgresql"
    gen:
      go:
        package: "dbgen"
        out: "internal/repository/dbgen" # 路径变干净了
        sql_package: "pgx/v5"
        emit_json_tags: true
        overrides:
          - db_type: "numeric"
            go_type: "github.com/shopspring/decimal.Decimal"
          - db_type: "decimal"
            go_type: "github.com/shopspring/decimal.Decimal"
