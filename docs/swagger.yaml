schemes:
- http
- https
securityDefinitions:
  ApiKeyAuth:
    description: Programmatic API key for server-to-server access.
    in: header
    name: X-API-Key
    type: apiKey
  BearerAuth:
    description: 'Use the format: Bearer {access_token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
