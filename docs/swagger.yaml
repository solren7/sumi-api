basePath: /
definitions:
  handlers.APIKeyResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      last_used_at:
        type: string
      name:
        type: string
      prefix:
        type: string
      scopes:
        items:
          type: string
        type: array
      status:
        type: string
    type: object
  handlers.AuthRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  handlers.AuthResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/handlers.UserResponse'
    type: object
  handlers.BillResponse:
    properties:
      amount:
        type: string
      category_id:
        type: integer
      created_at:
        type: string
      currency:
        type: string
      description:
        type: string
      id:
        type: integer
      occurred_at:
        type: string
      type:
        type: integer
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  handlers.CheckEmailRequest:
    properties:
      email:
        type: string
    type: object
  handlers.CheckEmailResponse:
    properties:
      exists:
        type: boolean
    type: object
  handlers.CreateAPIKeyRequest:
    properties:
      expires_at:
        type: string
      name:
        type: string
      scopes:
        items:
          type: string
        type: array
    type: object
  handlers.CreateBillRequest:
    properties:
      amount:
        type: string
      category_id:
        type: integer
      currency:
        type: string
      description:
        type: string
      occurred_at:
        type: string
      type:
        type: integer
    type: object
  handlers.CreatedAPIKeyResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      key:
        type: string
      last_used_at:
        type: string
      name:
        type: string
      prefix:
        type: string
      scopes:
        items:
          type: string
        type: array
      status:
        type: string
    type: object
  handlers.ErrorResponse:
    properties:
      code:
        type: integer
      message:
        type: string
      success:
        type: boolean
    type: object
  handlers.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    type: object
  handlers.UpdateBillRequest:
    properties:
      amount:
        type: string
      category_id:
        type: integer
      currency:
        type: string
      description:
        type: string
      occurred_at:
        type: string
      type:
        type: integer
    type: object
  handlers.UserResponse:
    properties:
      created_at:
        type: string
      default_currency:
        type: string
      email:
        type: string
      id:
        type: string
      timezone:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  services.CategoryNode:
    properties:
      children:
        items:
          $ref: '#/definitions/services.CategoryNode'
        type: array
      id:
        type: integer
      level:
        type: integer
      name:
        type: string
      parent_id:
        type: integer
      type:
        type: integer
    type: object
  services.CategoryStatsItem:
    properties:
      amount:
        type: string
      category_id:
        type: integer
      category_name:
        type: string
      currency:
        type: string
      parent_category_id:
        type: integer
      parent_category_name:
        type: string
    type: object
  services.CategoryStatsOutput:
    properties:
      items:
        items:
          $ref: '#/definitions/services.CategoryStatsItem'
        type: array
      month:
        type: string
      type:
        type: integer
    type: object
  services.DailyStatsDay:
    properties:
      date:
        type: string
      items:
        items:
          $ref: '#/definitions/services.DailyStatsItem'
        type: array
    type: object
  services.DailyStatsItem:
    properties:
      currency:
        type: string
      expense:
        type: string
      income:
        type: string
    type: object
  services.DailyStatsOutput:
    properties:
      days:
        items:
          $ref: '#/definitions/services.DailyStatsDay'
        type: array
      month:
        type: string
    type: object
  services.MonthlyStatsItem:
    properties:
      currency:
        type: string
      net_amount:
        type: string
      total_expense:
        type: string
      total_income:
        type: string
    type: object
  services.MonthlyStatsOutput:
    properties:
      items:
        items:
          $ref: '#/definitions/services.MonthlyStatsItem'
        type: array
      month:
        type: string
    type: object
info:
  contact: {}
  description: Accounting app backend API for auth, categories, transactions, stats,
    and API keys.
  title: Sumi API
  version: 0.1.0
paths:
  /api/api-keys:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.APIKeyResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List API keys
      tags:
      - API Keys
    post:
      consumes:
      - application/json
      parameters:
      - description: API key payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAPIKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.CreatedAPIKeyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create API key
      tags:
      - API Keys
  /api/api-keys/{id}:
    delete:
      parameters:
      - description: API key UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete API key
      tags:
      - API Keys
  /api/api-keys/{id}/revoke:
    post:
      parameters:
      - description: API key UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke API key
      tags:
      - API Keys
  /api/auth/check-email:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CheckEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CheckEmailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Check whether an email is already registered
      tags:
      - Auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.AuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Login with email and password
      tags:
      - Auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Logout current refresh token
      tags:
      - Auth
  /api/auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.AuthRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /api/bills:
    get:
      parameters:
      - default: 20
        description: Page size
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      - description: 'Transaction type: 1 expense, 2 income'
        in: query
        name: type
        type: integer
      - description: Category ID
        in: query
        name: category_id
        type: integer
      - description: Currency code
        in: query
        name: currency
        type: string
      - description: Start datetime (RFC3339)
        in: query
        name: start_time
        type: string
      - description: End datetime (RFC3339)
        in: query
        name: end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.BillResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: List transactions
      tags:
      - Transactions
    post:
      consumes:
      - application/json
      parameters:
      - description: Transaction payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateBillRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.BillResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Create transaction
      tags:
      - Transactions
  /api/bills/{id}:
    delete:
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Delete transaction
      tags:
      - Transactions
    get:
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.BillResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Get transaction
      tags:
      - Transactions
    put:
      consumes:
      - application/json
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      - description: Transaction payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateBillRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.BillResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Update transaction
      tags:
      - Transactions
  /api/categories:
    get:
      parameters:
      - default: 1
        description: 'Category type: 1 expense, 2 income'
        in: query
        name: type
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/services.CategoryNode'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: List system categories
      tags:
      - Categories
  /api/stats/category:
    get:
      parameters:
      - description: Month in YYYY-MM
        in: query
        name: month
        type: string
      - default: 1
        description: 'Transaction type: 1 expense, 2 income'
        in: query
        name: type
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.CategoryStatsOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Get category stats
      tags:
      - Stats
  /api/stats/daily:
    get:
      parameters:
      - description: Month in YYYY-MM
